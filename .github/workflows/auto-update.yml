name: 生成 migu.txt
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 生成 migu.txt
        run: |
          node -e "
          const fs = require('fs');
          const ipData = JSON.parse(fs.readFileSync('ip_all.json','utf8'));
          let allIPs = [];
          for(let k in ipData.ip_list) allIPs = allIPs.concat(ipData.ip_list[k]);
          const useIPs = allIPs.slice(0,7);

          let template = fs.readFileSync('interface.txt','utf8');
          let output = [];

          const lines = template.split(/\r?\n/);
          let currentInfo = '';

          for (let line of lines) {
            if (line.startsWith('#EXTINF')) {
              currentInfo = line;
            } else if (line.includes('${replace}') && currentInfo) {
              useIPs.forEach(ip => {
                output.push(currentInfo);
                output.push(line.replace(/\$\{replace\}/g, ip));
              });
            } else if (line.startsWith('#EXTM3U')) {
              output.push(line.replace(/\$\{replace\}/g, useIPs[0]));
            }
          }

          fs.writeFileSync('migu.txt', output.join('\n'), 'utf8');
          console.log('✅ 生成成功！');
          "

      - name: 提交文件
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add migu.txt
          git commit -m "update"
          git push
