name: ok
on: push

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 显示 IP 列表（不会失败）
        run: |
          node -e "
          const fs=require('fs');
          const d=JSON.parse(fs.readFileSync('ip_all.json','utf8'));
          let ips=[];
          for(let k in d.ip_list) ips=ips.concat(d.ip_list[k]);
          console.log(ips.slice(0,7));
          "
