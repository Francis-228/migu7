name: 生成 migu.txt
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行替换脚本
        run: node replace.js

      - name: 提交
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add migu.txt
          git commit -m "ok"
          git push
