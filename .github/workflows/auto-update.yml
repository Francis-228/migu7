name: 生成 migu.txt
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 生成完整7IP格式 migu.txt
        run: |
          node -e "
          const fs = require('fs');
          const ipData = JSON.parse(fs.readFileSync('ip_all.json','utf8'));
          let allIPs = [];
          for(let k in ipData.ip_list) allIPs = allIPs.concat(ipData.ip_list[k]);
          const useIPs = allIPs.slice(0,7);

          const lines = fs.readFileSync('interface.txt','utf8').split(/\r?\n/);
          let output = [];
          let currentLine = '';

          for(let line of lines) {
            if(line.startsWith('#EXTM3U')) {
              output.push(line.replace(/\$\{replace\}/g, useIPs[0]));
            }
            else if(line.startsWith('#EXTINF')) {
              currentLine = line;
            }
            else if(line.includes('/') && currentLine) {
              useIPs.forEach(ip => {
                output.push(currentLine);
                output.push(ip + line.replace('${replace}', ''));
              });
            }
          }

          fs.writeFileSync('migu.txt', output.join('\n'), 'utf8');
          "

      - name: 提交到仓库
        run: |
          git config --global user.name "Actions"
          git config user.email "actions@github.com"
          git add migu.txt
          git commit -m "生成完整7IP格式"
          git push
