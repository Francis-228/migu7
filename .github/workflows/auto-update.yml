name: 生成 migu.txt
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 只替换变量 生成 migu.txt
        run: |
          node -e "
          const fs = require('fs');
          
          // 读取IP
          const ipData = JSON.parse(fs.readFileSync('ip_all.json','utf8'));
          let ips = [];
          for(let k in ipData.ip_list) ips = ips.concat(ipData.ip_list[k]);
          const ipList = ips.slice(0,7);

          // 读取模板
          let tpl = fs.readFileSync('interface.txt','utf8');
          let result = '';

          // 循环7个IP，每个IP生成一套完整频道
          ipList.forEach(ip => {
            let content = tpl.replace(/\$\{replace\}/g, ip);
            result += content + '\n';
          });

          // 写入文件
          fs.writeFileSync('migu.txt', result, 'utf8');
          console.log('✅ 生成成功！全部是真实IP！无变量！');
          "

      - name: 提交到仓库
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add migu.txt
          git commit -m "生成完整IP版"
          git push
