name: 输出migu.txt内容
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 直接在日志里生成完整migu.txt
        run: |
          node -e '
            const fs = require("fs");
            const ipData = JSON.parse(fs.readFileSync("ip_all.json", "utf8"));
            let allIPs = [];
            for (let group in ipData.ip_list) {
              allIPs = allIPs.concat(ipData.ip_list[group]);
            }
            const top7IPs = allIPs.slice(0, 7);
            const template = fs.readFileSync("interface.txt", "utf8");
            const lines = template.split(/\r?\n/);
            let output = [];
            for (const line of lines) {
              if (line.startsWith("#EXT") || line.trim() === "") {
                output.push(line);
                continue;
              }
              if (line.includes("${replace}")) {
                for (const ip of top7IPs) {
                  output.push(line.replace(/\$\{replace\}/g, ip));
                }
              } else {
                output.push(line);
              }
            }
            console.log("\n===== 完整migu.txt内容开始 =====");
            console.log(output.join("\n"));
            console.log("===== 完整migu.txt内容结束 =====");
          '
