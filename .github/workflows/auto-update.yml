name: 生成可播放 migu.txt
on:
  push:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动更新一次

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false  # 修复git push权限问题

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成纯净播放源（自动筛选可用IP）
        run: |
          cat > run.mjs << 'EOF'
          import fs from 'fs';
          import http from 'http';

          // 读取IP
          const ipData = JSON.parse(fs.readFileSync('ip_all.json', 'utf8'));
          let ips = [];
          for (let k in ipData.ip_list) ips = ips.concat(ipData.ip_list[k]);

          // 读取模板
          const tpl = fs.readFileSync('interface.txt', 'utf8').split(/\r?\n/);
          let output = ['#EXTM3U'];
          let currentInfo = '';

          // 超时时间（毫秒）
          const timeout = 2500;

          // 测试IP是否可用
          async function testIP(ip) {
            return new Promise(resolve => {
              const testUrl = `http://${ip}/`;
              const req = http.get(testUrl, res => {
                if (res.statusCode >= 200 && res.statusCode < 500) resolve(true);
                else resolve(false);
              }).on('error', () => resolve(false));
              req.setTimeout(timeout, () => {
                req.destroy();
                resolve(false);
              });
            });
          }

          // 筛选可用IP
          async function filterIPs() {
            console.log("🔍 正在筛选可用IP...");
            let usableIPs = [];
            // 限制测试数量，避免超时
            const testLimit = Math.min(ips.length, 15);
            for (let i = 0; i < testLimit; i++) {
              const ok = await testIP(ips[i]);
              if (ok) usableIPs.push(ips[i]);
            }
            console.log("✅ 可用IP：", usableIPs.length + " 个");
            // 最多保留7个可用IP
            return usableIPs.slice(0, 7);
          }

          // 生成播放列表
          filterIPs().then(useIPs => {
            if (useIPs.length === 0) {
              console.log("⚠️ 未检测到可用IP，使用原始模板生成");
              useIPs = [ips[0]]; // 无可用IP时保底
            }
            
            for (let line of tpl) {
              const trimLine = line.trim();
              if (trimLine.startsWith('#EXTINF')) {
                currentInfo = trimLine;
              } else if (trimLine.includes('${replace}') && currentInfo) {
                useIPs.forEach(ip => {
                  output.push(currentInfo);
                  output.push('http://' + ip + trimLine.replace('${replace}', ''));
                });
                currentInfo = '';
              }
            }
            
            fs.writeFileSync('migu.txt', output.join('\n'), 'utf8');
            console.log("✅ migu.txt 生成完成，只保留可连通IP！");
          }).catch(err => {
            console.error("❌ 错误：", err);
            process.exit(1);
          });
          EOF

          node run.mjs

      - name: 提交并推送变更
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.head_ref || github.ref_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto: 已筛选可用IP"
          force: false
