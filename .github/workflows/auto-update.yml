name: 生成可播放 migu.txt
on:
  push:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 筛选咪咕真正可用IP并生成migu.txt
        run: |
          cat > run.mjs << 'EOF'
          import fs from 'fs';
          import https from 'https';
          import http from 'http';

          // 全局配置
          const TIMEOUT = 4000;
          const MAX_TEST = 15;        // 最多测试多少IP
          const KEEP_COUNT = 8;       // 最终保留多少可用IP
          const MIGU_CHECK_HOST = 'effic.migufun.com';

          // 关闭 SSL 严格校验（避免国内接口证书问题）
          process.env.NODE_TLS_REJECT_UNAUTHORIZED = '0';
          const agent = new https.Agent({ rejectUnauthorized: false });

          // 1. 读取 IP 列表
          const ipData = JSON.parse(fs.readFileSync('ip_all.json', 'utf8'));
          let allIPs = [];
          for (const key in ipData.ip_list) {
            allIPs = allIPs.concat(ipData.ip_list[key]);
          }
          allIPs = [...new Set(allIPs)]; // 自动去重

          // 2. 读取播放模板 interface.txt
          const templateLines = fs.readFileSync('interface.txt', 'utf8').split(/\r?\n/);

          // ------------------------------
          // 检测：咪咕地域鉴权（是否国内IP）
          // ------------------------------
          function checkMiguAuth() {
            return new Promise(resolve => {
              const options = {
                hostname: MIGU_CHECK_HOST,
                port: 8443,
                path: '/user/queryProvince',
                timeout: TIMEOUT,
                agent
              };

              const req = https.get(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    const success = json.returnCode === '000000' && json.resultData?.ipProvince !== '海外';
                    resolve(success);
                  } catch {
                    resolve(false);
                  }
                });
              });

              req.on('error', () => resolve(false));
              req.on('timeout', () => { req.destroy(); resolve(false); });
            });
          }

          // ------------------------------
          // 实测：IP 是否能播放咪咕（m3u8）
          // ------------------------------
          function testIP(ip, testPath) {
            return new Promise(resolve => {
              const url = `http://${ip}${testPath}`;
              const req = http.get(url, { timeout: TIMEOUT }, (res) => {
                const ok = (
                  res.statusCode >= 200 &&
                  res.statusCode < 300 &&
                  res.headers['content-type']?.includes('m3u8')
                );
                resolve(ok);
              });
              req.on('error', () => resolve(false));
              req.on('timeout', () => { req.destroy(); resolve(false)); });
            });
          }

          // ------------------------------
          // 从模板提取测试路径
          // ------------------------------
          function getTestPath() {
            for (const line of templateLines) {
              if (line.includes('${replace}')) {
                return line.replace('${replace}', '').trim();
              }
            }
            return '/playlist.m3u8';
          }

          // ------------------------------
          // 主逻辑：批量测试 → 筛选可用IP
          // ------------------------------
          async function main() {
            console.log('📶 开始检测咪咕可用IP...');
            const isCN = await checkMiguAuth();

            if (!isCN) {
              console.log('⚠️ Action环境为海外，使用高兼容保底IP');
              return allIPs.slice(0, KEEP_COUNT);
            }

            const testPath = getTestPath();
            const usable = [];
            const testList = allIPs.slice(0, MAX_TEST);

            for (const ip of testList) {
              const pass = await testIP(ip, testPath);
              if (pass) {
                console.log('✅ 可用:', ip);
                usable.push(ip);
              } else {
                console.log('❌ 不可用:', ip);
              }
              if (usable.length >= KEEP_COUNT) break;
            }

            const finalList = usable.length ? usable : allIPs.slice(0, KEEP_COUNT);
            console.log(`🎯 最终可用IP数：${finalList.length}`);
            return finalList;
          }

          // ------------------------------
          // 生成最终 migu.txt
          // ------------------------------
          main().then(validIPs => {
            const output = ['#EXTM3U'];
            let extInfo = '';

            for (const line of templateLines) {
              const trim = line.trim();
              if (trim.startsWith('#EXTINF')) {
                extInfo = trim;
              } else if (trim.includes('${replace}') && extInfo) {
                const uri = trim.replace('${replace}', '');
                validIPs.forEach(ip => {
                  output.push(extInfo);
                  output.push(`http://${ip}${uri}`);
                });
                extInfo = '';
              }
            }

            fs.writeFileSync('migu.txt', output.join('\n'), 'utf8');
            console.log('✅ migu.txt 生成完成！');
          }).catch(err => {
            console.error('❌ 脚本异常:', err);
            process.exit(1);
          });
          EOF

          node run.mjs

      - name: 提交更新
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add migu.txt
          git commit -m "Auto: 更新咪咕可用播放IP" || echo "无更新"

      - name: 推送到仓库
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
