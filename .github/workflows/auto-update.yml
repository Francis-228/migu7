name: build
on: push

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成多IP直播源
        run: node replace-ip.js

      - name: 保存生成的文件
        uses: actions/upload-artifact@v4
        with:
          name: my-live
          path: |
            可用-interface.txt
            可用-interfaceTXT.txt
