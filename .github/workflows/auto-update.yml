name: 生成migu7线路
on: push

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 执行生成脚本
        run: node build.js

      - name: 提交migu.txt到仓库
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          git add migu.txt
          git commit -m "生成 单台7IP线路"
          git push
